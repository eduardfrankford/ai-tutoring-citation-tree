services:
  backend:
    build: ./backend
    container_name: citviz-backend
    environment:
      # Required: Anthropic API key — the backend uses Claude + web search
      # to discover citations. See https://console.anthropic.com/settings/keys
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Optional: override the default model (defaults to claude-opus-4-8).
      # For lower cost, set to claude-sonnet-4-6.
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-claude-opus-4-8}
      # Optional: cap web-search calls per Claude turn (each costs ~$0.01).
      ANTHROPIC_MAX_WEB_SEARCHES: ${ANTHROPIC_MAX_WEB_SEARCHES:-4}
    expose:
      - "8765"
    ports:
      # Exposed so you can hit the API directly during development.
      - "8765:8765"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8765/api/health', timeout=3).status==200 else 1)"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 10s

  frontend:
    build: ./frontend
    container_name: citviz-frontend
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8090:80"
    restart: unless-stopped
