server {
  listen       80;
  server_name  _;
  root /usr/share/nginx/html;
  index index.html;

  # Reverse-proxy /api to the FastAPI service. The SSE endpoint needs buffering
  # disabled so events stream to the client immediately.
  location /api/ {
    proxy_pass         http://backend:8765;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;

    proxy_buffering    off;
    proxy_cache        off;
    proxy_read_timeout 1h;
    chunked_transfer_encoding on;
  }

  # SPA fallback: everything else is served by the Angular bundle.
  location / {
    try_files $uri $uri/ /index.html;
  }
}
